<!DOCTYPE html>
<html>
<head>
    <title>FLAMES Game</title>

    <style>
    body {
        font-family: Arial;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* 🔥 New beautiful gradient */
        background: linear-gradient(135deg, #1e3c72, #2a5298, #ff758c);

        /* Smooth animation */
        background-size: 300% 300%;
        animation: gradientMove 8s ease infinite;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);   /* glass effect */
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        width: 320px;

        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.3);
    }

    h1 {
        color: white;
    }

    p {
        color: #f1f1f1;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: linear-gradient(45deg, #ff4b5c, #ff758c);
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        opacity: 0.9;
    }
</style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>
</head>

<body>

    <div class="container">
        <h1>🔥 FLAMES Game</h1>
        <p>Meeku iddari madhya emi undho chuddam 😄</p>

        <form action="/submit" method="post" onsubmit="showLoading()">
            <input type="text" name="name1" placeholder="Mee Peru" required>
            <input type="text" name="name2" placeholder="Valla Peru" required>
            <button type="submit">Result Chuddam 🔥</button>
        </form>

        <div id="loading" class="loading">
            Calculating your destiny... 💫
        </div>
    </div>

</body>
</html>
