<!DOCTYPE html>
<html>
<head>
    <title>FLAMES Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            padding-top: 80px;
            color: white;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #ff4b5c;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e63b4c;
        }

        h2 {
            margin-top: 20px;
            color: yellow;
        }
    </style>
</head>

<body>
    <h1>🔥 FLAMES Game</h1>

    <form action="/submit" method="post">
        <input type="text" name="name1" placeholder="Your Name" required><br>
        <input type="text" name="name2" placeholder="Partner Name" required><br>
        <button type="submit">Check Result</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
    {% endif %}
</body>
</html>
