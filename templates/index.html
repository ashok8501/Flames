<!DOCTYPE html>
<html>
<head>
    <title>FLAMES Game</title>

    <style>
        body {
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
            color: #ff4b5c;
        }

        p {
            margin-bottom: 15px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #ff4b5c;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e63b4c;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #555;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>
</head>

<body>

    <div class="container">
        <h1>🔥 FLAMES Game</h1>
        <p>Meeku iddari madhya emi undho chuddam 😄</p>

        <form action="/submit" method="post" onsubmit="showLoading()">
            <input type="text" name="name1" placeholder="Mee Peru" required>
            <input type="text" name="name2" placeholder="Valla Peru" required>
            <button type="submit">Result Chuddam 🔥</button>
        </form>

        <div id="loading" class="loading">
            Calculating your destiny... 💫
        </div>
    </div>

</body>
</html>
